services:
  product-raw:
    build: .
    container_name: product-raw
    image: registry.quangit.site/dev/product-raw
    restart: unless-stopped
    ports:
      - "13001:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
